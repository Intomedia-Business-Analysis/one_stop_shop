name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Installér afhængigheder
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Kør røgtests
        run: pytest tests/ -q
