<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log ind — Intomedia Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/hub.css">
  <link rel="icon" type="image/svg+xml" href="/static/icons/pulse.svg">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      padding: 1.5rem;
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
    }

    .login-logo {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: 2rem;
      justify-content: center;
    }

    .login-logo-mark {
      width: 40px;
      height: 40px;
      background: var(--green);
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      border-radius: var(--r-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: -.5px;
    }

    .login-logo-text {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -.3px;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 2rem;
      box-shadow: 0 4px 24px rgba(0,0,0,.06);
    }

    .login-card h1 {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--text);
      margin: 0 0 .25rem;
    }

    .login-card p.sub {
      font-size: .8125rem;
      color: var(--text-muted);
      margin: 0 0 1.75rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: .375rem;
      margin-bottom: 1rem;
    }

    .field label {
      font-size: .8125rem;
      font-weight: 500;
      color: var(--text);
    }

    .field input {
      padding: .625rem .875rem;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      font-family: inherit;
      font-size: .875rem;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color .15s;
    }

    .field input:focus {
      border-color: var(--green);
    }

    .error-msg {
      background: #fff3f3;
      border: 1px solid #f5c2c7;
      color: #842029;
      border-radius: var(--r-sm);
      padding: .625rem .875rem;
      font-size: .8125rem;
      margin-bottom: 1rem;
    }

    .btn-login {
      width: 100%;
      padding: .75rem;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: var(--r-sm);
      font-family: inherit;
      font-size: .9375rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: .5rem;
      transition: opacity .15s;
    }

    .btn-login:hover {
      opacity: .88;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <div class="login-logo-mark">:m</div>
      <span class="login-logo-text">intomedia</span>
    </div>

    <div class="login-card">
      <h1>Log ind på Intomedia Hub</h1>
      <p class="sub">Brug dit tildelte brugernavn og adgangskode</p>

      {% if error %}
      <div class="error-msg">{{ error }}</div>
      {% endif %}

      <form method="post" action="/login">
        <div class="field">
          <label for="username">Brugernavn</label>
          <input type="text" id="username" name="username" autocomplete="username" autofocus required>
        </div>
        <div class="field">
          <label for="password">Adgangskode</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-login">Log ind</button>
      </form>
    </div>
  </div>
</body>
</html>
