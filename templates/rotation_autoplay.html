<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotation — Intomedia Hub</title>
<link rel="stylesheet" href="/static/hub.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

/* Kontrol-bar øverst */
.ctrl-bar {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 10px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  height: 52px;
  flex-shrink: 0;
}
.ctrl-logo {
  width: 28px; height: 28px;
  background: var(--green);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 13px; flex-shrink: 0;
}
.ctrl-title { font-size: 13px; font-weight: 700; color: var(--ink); flex: 1; }

/* Tab-indikatorer */
.tabs { display: flex; gap: 6px; }
.tab-dot {
  height: 6px; border-radius: 3px;
  background: var(--border-strong);
  cursor: pointer;
  transition: all .3s;
  width: 24px;
}
.tab-dot.active { background: var(--green); width: 36px; }

/* Progress bar */
.progress-wrap {
  width: 120px; height: 4px;
  background: var(--border);
  border-radius: 2px; overflow: hidden; flex-shrink: 0;
}
.progress-bar {
  height: 100%; background: var(--green);
  border-radius: 2px;
  transition: width linear;
  width: 0%;
}

/* Knapper */
.btn {
  padding: 6px 14px;
  border: 1px solid var(--border-strong);
  border-radius: var(--r-sm);
  background: var(--surface);
  font-family: var(--font);
  font-size: 11px; font-weight: 600;
  cursor: pointer; color: var(--ink-2);
  display: flex; align-items: center; gap: 5px;
  transition: all .15s;
}
.btn:hover { border-color: var(--green); color: var(--green); }
.btn.active { background: var(--green); color: #fff; border-color: var(--green); }

.speed-select {
  font-family: var(--font); font-size: 11px;
  border: 1px solid var(--border-strong);
  border-radius: var(--r-sm);
  padding: 5px 8px; color: var(--ink-2);
  background: var(--surface); cursor: pointer;
}

.lbl-current {
  font-size: 11px; font-weight: 600; color: var(--ink-3);
  white-space: nowrap; max-width: 200px;
  overflow: hidden; text-overflow: ellipsis;
}

/* Fullscreen-knap */
.btn-fs { margin-left: auto; }

/* iframe-container */
.iframe-wrap {
  flex: 1; position: relative; overflow: hidden;
}
.dash-frame {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  border: none;
  opacity: 0;
  transition: opacity .4s;
  pointer-events: none;
}
.dash-frame.visible {
  opacity: 1;
  pointer-events: auto;
}

/* Fullscreen mode — skjul ctrl-bar */
body.fs-mode .ctrl-bar { display: none; }
body.fs-mode .iframe-wrap { height: 100vh; }

body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; background: var(--bg); }
</style>
</head>
<body>

<!-- Kontrol-bar -->
<div class="ctrl-bar">
  <div class="ctrl-logo">▶</div>
  <div class="ctrl-title">Rotation Dashboards</div>

  <div class="tabs" id="tabDots"></div>
  <span class="lbl-current" id="lblCurrent">—</span>

  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>

  <button class="btn" id="btnPrev" title="Forrige">◀ Forrige</button>
  <button class="btn active" id="btnPlay">⏸ Pause</button>
  <button class="btn" id="btnNext" title="Næste">Næste ▶</button>

  <select class="speed-select" id="speedSelect" title="Interval">
    <option value="10">10 sek</option>
    <option value="20">20 sek</option>
    <option value="30" selected>30 sek</option>
    <option value="60">1 min</option>
    <option value="120">2 min</option>
  </select>

  <button class="btn btn-fs" id="btnFs" title="Fuld skærm">⛶ Fuld skærm</button>
</div>

<!-- iframes -->
<div class="iframe-wrap" id="iframeWrap"></div>

<script>
const DASHBOARDS = [
  { title: 'Sales Performance',       url: '/tools/rotation/sales-performance'       },
  { title: 'Department Performance',  url: '/tools/rotation/department-performance'  },
  { title: 'Banner Performance',      url: '/tools/rotation/banner-performance'      },
  { title: 'Advertising Performance', url: '/tools/rotation/advertising-performance' },
  { title: 'Media Performance',       url: '/tools/rotation/media-performance'       },
];

let current   = 0;
let playing   = true;
let interval  = 30; // sekunder
let timer     = null;
let progTimer = null;

const wrap       = document.getElementById('iframeWrap');
const dotWrap    = document.getElementById('tabDots');
const lblCurrent = document.getElementById('lblCurrent');
const progressBar= document.getElementById('progressBar');
const btnPlay    = document.getElementById('btnPlay');
const btnPrev    = document.getElementById('btnPrev');
const btnNext    = document.getElementById('btnNext');
const speedSel   = document.getElementById('speedSelect');
const btnFs      = document.getElementById('btnFs');

// Opret iframes + dots
const frames = DASHBOARDS.map((d, i) => {
  const fr = document.createElement('iframe');
  fr.className = 'dash-frame';
  fr.src = d.url;
  fr.title = d.title;
  wrap.appendChild(fr);

  const dot = document.createElement('div');
  dot.className = 'tab-dot';
  dot.title = d.title;
  dot.addEventListener('click', () => { goTo(i); if (!playing) startPlay(); });
  dotWrap.appendChild(dot);

  return { frame: fr, dot };
});

function goTo(idx) {
  frames[current].frame.classList.remove('visible');
  frames[current].dot.classList.remove('active');
  current = (idx + DASHBOARDS.length) % DASHBOARDS.length;
  frames[current].frame.classList.add('visible');
  frames[current].dot.classList.add('active');
  lblCurrent.textContent = DASHBOARDS[current].title;
  resetProgress();
}

function resetProgress() {
  progressBar.style.transition = 'none';
  progressBar.style.width = '0%';
  if (playing) {
    requestAnimationFrame(() => {
      progressBar.style.transition = `width ${interval}s linear`;
      progressBar.style.width = '100%';
    });
  }
}

function startPlay() {
  clearInterval(timer);
  playing = true;
  btnPlay.textContent = '⏸ Pause';
  btnPlay.classList.add('active');
  resetProgress();
  timer = setInterval(() => goTo(current + 1), interval * 1000);
}

function stopPlay() {
  clearInterval(timer);
  playing = false;
  btnPlay.textContent = '▶ Afspil';
  btnPlay.classList.remove('active');
  progressBar.style.transition = 'none';
}

btnPlay.addEventListener('click', () => playing ? stopPlay() : startPlay());
btnPrev.addEventListener('click', () => { goTo(current - 1); if (playing) startPlay(); });
btnNext.addEventListener('click', () => { goTo(current + 1); if (playing) startPlay(); });

speedSel.addEventListener('change', () => {
  interval = parseInt(speedSel.value);
  if (playing) startPlay();
});

// Fuld skærm
btnFs.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
    document.body.classList.add('fs-mode');
    btnFs.textContent = '✕ Afslut fuld skærm';
  } else {
    document.exitFullscreen();
    document.body.classList.remove('fs-mode');
    btnFs.textContent = '⛶ Fuld skærm';
  }
});
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) {
    document.body.classList.remove('fs-mode');
    btnFs.textContent = '⛶ Fuld skærm';
  }
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { goTo(current + 1); if (playing) startPlay(); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { goTo(current - 1); if (playing) startPlay(); }
  if (e.key === ' ')  { e.preventDefault(); playing ? stopPlay() : startPlay(); }
  if (e.key === 'f' || e.key === 'F') btnFs.click();
});

// Start
goTo(0);
startPlay();
</script>
</body>
</html>
