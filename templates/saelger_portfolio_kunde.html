<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kundedetaljer — Intomedia Hub</title>
<link rel="stylesheet" href="/static/hub.css">
<style>
.tool-wrap{max-width:1000px;margin:0 auto}

.dash-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px;position:relative;overflow:hidden;margin-bottom:20px}
.dash-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--green);border-radius:var(--r) var(--r) 0 0}
.dash-card-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--ink-4);margin-bottom:16px}

.kpi-row{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:20px}
@media(max-width:700px){.kpi-row{grid-template-columns:1fr}}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--green);border-radius:var(--r) var(--r) 0 0}
.kpi-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--ink-4);margin-bottom:10px}
.kpi-value{font-size:28px;font-weight:800;color:var(--ink);letter-spacing:-1px;line-height:1}
.kpi-value.green{color:var(--green)}

.v-table-wrap{overflow-x:auto}
.v-table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.v-table col.c-titel{width:auto}
.v-table col.c-id{width:90px}
.v-table col.c-saelger{width:150px}
.v-table col.c-dato{width:110px}
.v-table col.c-value{width:130px}
.v-table td.trunc{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.v-table th{background:var(--green);color:#fff;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;padding:9px 12px;text-align:left;white-space:nowrap}
.v-table th.num{text-align:right}
.v-table th.sortable{cursor:pointer;user-select:none}
.v-table th.sortable:hover{background:var(--green-mid,#1a7a4a)}
.v-table th .sort-arrow{margin-left:5px;opacity:.5;font-style:normal;font-size:12px}
.v-table th.sort-active .sort-arrow{opacity:1;font-size:13px}
.v-table td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--ink-2);vertical-align:middle}
.v-table tr:hover td{background:var(--green-light,#f0f8f4)}
.v-table .num{text-align:right;font-variant-numeric:tabular-nums;font-weight:600;white-space:nowrap}
.v-table .muted{color:var(--ink-4)}
.v-table .empty{text-align:center;padding:40px;color:var(--ink-4);font-style:italic}
.v-table tfoot td{padding:10px 12px;border-top:2px solid var(--border);font-weight:800;color:var(--ink)}

.spin-wrap{text-align:center;padding:60px;color:var(--ink-4);font-size:12px}
.spinner{display:inline-block;width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none}

.filter-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.filter-bar .filter-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--ink-4);white-space:nowrap}
.filter-bar input{font-family:var(--font);font-size:12px;font-weight:600;color:var(--ink);background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);padding:6px 10px;outline:none}
.filter-bar input:focus{border-color:var(--green)}
.deal-filter-count{font-size:11px;color:var(--ink-4);margin-left:auto}
</style>
</head>
<body>
<div class="shell">

  <!-- SIDEBAR -->
  {% with active_url='/tools/saelger-portfolio/' %}{% include "_sidebar.html" %}{% endwith %}

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="search-trigger" role="button" tabindex="0">
        <div class="st-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
        </div>
        <span class="st-text">Søg i dashboards, tools og kategorier…</span>
        <div class="st-right"><span class="st-k">⌘</span><span class="st-k">K</span></div>
      </div>
      <div class="tb-right">
        <a href="/tools/saelger-portfolio/{% if back_owner %}?owner={{ back_owner | urlencode }}{% endif %}" class="tb-btn">← Tilbage til porteføljen</a>
      </div>
    </div>

    <div class="content-area">
      <div class="tool-wrap">

        <div class="breadcrumb">
          <a href="/" class="bc-link">Hub</a><span class="bc-sep">/</span>
          <a href="/tools/saelger-portfolio/{% if back_owner %}?owner={{ back_owner | urlencode }}{% endif %}" class="bc-link">Sælger Portefølje</a><span class="bc-sep">/</span>
          <span id="bc-org-name">Kundedetaljer</span>
        </div>

        <!-- Loading -->
        <div id="loading-state" class="spin-wrap">
          <div class="spinner"></div>
          <div>Henter kundens abonnementer…</div>
        </div>

        <!-- Content -->
        <div id="page-content" class="hidden">

          <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap">
            <div>
              <h1 class="page-title" id="org-name-title" style="margin-bottom:4px"></h1>
              <p class="page-sub" id="org-sub"></p>
            </div>
          </div>

          <!-- KPI row -->
          <div class="kpi-row" id="kpi-row"></div>

          <!-- Abonnementer: filterlinje + én tabel pr. medie/site -->
          <div class="dash-card">
            <div class="dash-card-title" style="display:flex;align-items:center;justify-content:space-between;gap:12px">
              <span>Abonnementer pr. medie</span>
              <button class="xls-btn" id="export-btn" onclick="exportDeals()" disabled title="Hent kundens abonnementer som Excel">
                <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Excel
              </button>
            </div>
            <div class="filter-bar" style="margin-bottom:0">
              <span class="filter-label">Søg</span>
              <input type="text" id="filter-titel" placeholder="Søg titel…" oninput="renderDeals()" autocomplete="off" style="min-width:200px">
              <span class="deal-filter-count" id="filter-count"></span>
            </div>
          </div>

          <!-- Én dash-card pr. medie indsættes her -->
          <div id="sites-container"></div>

        </div>

        <!-- Error state -->
        <div id="error-state" class="hidden" style="text-align:center;padding:60px;color:#B32E45">
          <div style="font-size:32px;margin-bottom:12px">⚠</div>
          <div style="font-weight:700;margin-bottom:6px">Kunne ikke hente kundedata</div>
          <div style="font-size:12px;color:var(--ink-4)" id="error-msg"></div>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="/static/export-utils.js"></script>
<script>
const orgId     = {{ org_id | tojson }};
const backOwner = {{ back_owner | tojson }};
let allDeals = [];
let orgName  = '';
let dealSortCol = 'value';
let dealSortDir = 'desc';

function fmtFull(v) {
  if (v === null || v === undefined) return '—';
  return Math.round(v).toLocaleString('da-DK') + ' kr.';
}
// Dynamisk valuta: DKK → "kr.", øvrige (NOK/SEK/EUR/USD) med kode
function fmtMoney(v, cur) {
  if (v === null || v === undefined) return '—';
  const n = Math.round(v).toLocaleString('da-DK');
  return (cur && cur !== 'DKK') ? `${n} ${cur}` : `${n} kr.`;
}
function totalsByCurrency(rows) {
  const by = {};
  rows.forEach(d => { by[d.currency || 'DKK'] = (by[d.currency || 'DKK'] || 0) + (d.value || 0); });
  const parts = Object.entries(by).filter(([, v]) => Math.round(v) !== 0)
    .map(([cur, v]) => fmtMoney(v, cur));
  return parts.join(' · ') || '0 kr.';
}
function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function sortDeals(col) {
  if (dealSortCol === col) {
    dealSortDir = dealSortDir === 'desc' ? 'asc' : 'desc';
  } else {
    dealSortCol = col;
    dealSortDir = 'desc';
  }
  renderDeals();
}

function getShown() {
  const q = document.getElementById('filter-titel').value.trim().toLowerCase();
  let rows = q ? allDeals.filter(d => (d.title || '').toLowerCase().includes(q)) : allDeals.slice();
  rows.sort((a, b) => {
    if (dealSortCol === 'value') {
      // Sortér på DKK-værdien, så rækkefølgen er meningsfuld på tværs af valuta
      const av = a.value_dkk ?? 0, bv = b.value_dkk ?? 0;
      return dealSortDir === 'desc' ? bv - av : av - bv;
    }
    const av = a.activation_date || '', bv = b.activation_date || '';
    return dealSortDir === 'desc' ? bv.localeCompare(av) : av.localeCompare(bv);
  });
  return rows;
}

function arrowFor(col) {
  if (col !== dealSortCol) return '↕';
  return dealSortDir === 'desc' ? '↓' : '↑';
}

function siteTableHtml(site, rows) {
  return `
    <div class="dash-card">
      <div class="dash-card-title" style="display:flex;align-items:center;justify-content:space-between;gap:12px">
        <span>${escHtml(site)}</span>
        <span style="color:var(--green);font-size:13px;font-weight:800;letter-spacing:0;text-transform:none">${totalsByCurrency(rows)} · ${rows.length} abon.</span>
      </div>
      <div class="v-table-wrap">
      <table class="v-table">
        <colgroup>
          <col class="c-titel"><col class="c-id"><col class="c-saelger"><col class="c-dato"><col class="c-value">
        </colgroup>
        <thead>
          <tr>
            <th>Titel</th>
            <th>Deal-ID</th>
            <th>Sælger</th>
            <th class="sortable ${dealSortCol==='activation_date'?'sort-active':''}" onclick="sortDeals('activation_date')">Aktiveret<i class="sort-arrow">${arrowFor('activation_date')}</i></th>
            <th class="num sortable ${dealSortCol==='value'?'sort-active':''}" onclick="sortDeals('value')">Porteføljeværdi<i class="sort-arrow">${arrowFor('value')}</i></th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(d => `
            <tr>
              <td class="trunc" title="${escHtml(d.title)}">${escHtml(d.title)}</td>
              <td class="muted">${escHtml(d.pd_deal_id)}</td>
              <td class="trunc" title="${escHtml(d.owner_name)}">${escHtml(d.owner_name)}</td>
              <td>${escHtml(d.activation_date)}</td>
              <td class="num">${fmtMoney(d.value, d.currency)}</td>
            </tr>`).join('')}
        </tbody>
        <tfoot><tr><td colspan="4">I alt (${rows.length})</td><td class="num">${totalsByCurrency(rows)}</td></tr></tfoot>
      </table>
      </div>
    </div>`;
}

function renderDeals() {
  const deals = getShown();
  const container = document.getElementById('sites-container');

  document.getElementById('filter-count').textContent =
    deals.length < allDeals.length ? `Viser ${deals.length} af ${allDeals.length} abonnementer` : `${allDeals.length} abonnementer`;

  if (!deals.length) {
    container.innerHTML = '<div class="dash-card"><div class="empty">Ingen abonnementer matcher søgningen</div></div>';
    return;
  }

  // Gruppér efter medie/site og vis grupperne med størst ACV øverst
  const groups = {};
  deals.forEach(d => {
    const s = d.site || '(Uden medie)';
    (groups[s] = groups[s] || []).push(d);
  });
  const sumDkk = rows => rows.reduce((t, d) => t + (d.value_dkk || 0), 0);
  const sites  = Object.keys(groups).sort((a, b) => sumDkk(groups[b]) - sumDkk(groups[a]));

  container.innerHTML = sites.map(site => siteTableHtml(site, groups[site])).join('');
}

async function loadKunde() {
  try {
    const res = await fetch(`/tools/saelger-portfolio/customer-portfolio?org_id=${encodeURIComponent(orgId)}&owner=${encodeURIComponent(backOwner)}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const d = await res.json();

    document.getElementById('loading-state').classList.add('hidden');

    orgName = d.org_name || orgId;
    document.getElementById('org-name-title').textContent = orgName;
    document.getElementById('bc-org-name').textContent = orgName;
    document.title = orgName + ' — Intomedia Hub';
    document.getElementById('org-sub').textContent = `Org-ID ${d.org_id}`;

    allDeals = d.deals || [];
    const brandLabel = (d.accounts && d.accounts.length) ? d.accounts.join(', ') : 'alle brands';

    const siteCount = new Set(allDeals.map(d => d.site || '(Uden medie)')).size;

    document.getElementById('kpi-row').innerHTML = `
      <div class="kpi-card">
        <div class="kpi-label">Porteføljeværdi</div>
        <div class="kpi-value green">${totalsByCurrency(allDeals)}</div>
        <div class="kpi-sub">Brand: ${escHtml(brandLabel)}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Antal abonnementer</div>
        <div class="kpi-value">${allDeals.length}</div>
        <div class="kpi-sub">${siteCount} ${siteCount === 1 ? 'medie' : 'medier'} · deal_type = abonnement</div>
      </div>
    `;

    document.getElementById('export-btn').disabled = allDeals.length === 0;
    renderDeals();
    document.getElementById('page-content').classList.remove('hidden');

  } catch(e) {
    document.getElementById('loading-state').classList.add('hidden');
    document.getElementById('error-state').classList.remove('hidden');
    document.getElementById('error-msg').textContent = e.message;
  }
}

// ── Excel-eksport: respekterer aktiv søgning + sortering ────────────────
function exportDeals() {
  const shown = getShown();
  if (!shown.length) { HubExport.toast('Ingen abonnementer at eksportere'); return; }
  // Saml efter medie (størst ACV øverst), så Excel matcher visningen
  const groups = {};
  shown.forEach(d => { const s = d.site || '(Uden medie)'; (groups[s] = groups[s] || []).push(d); });
  const sumDkk = r => r.reduce((t, d) => t + (d.value_dkk || 0), 0);
  const rows = Object.keys(groups).sort((a, b) => sumDkk(groups[b]) - sumDkk(groups[a]))
    .flatMap(s => groups[s]);
  const slug = (orgName || orgId).toString()
    .toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '') || 'kunde';
  HubExport.download({
    filename: `abonnementer-${slug}.xlsx`,
    sheets: [{
      name:  'Abonnementer',
      title: `${orgName} — abonnementer (${rows.length})`,
      columns: [
        { header: 'Medie',            key: 'site',            width: 22, align: 'left'  },
        { header: 'Titel',            key: 'title',           width: 44, align: 'left'  },
        { header: 'Deal-ID',          key: 'pd_deal_id',      width: 12, align: 'left'  },
        { header: 'Sælger',           key: 'owner_name',      width: 22, align: 'left'  },
        { header: 'Aktiveret',        key: 'activation_date', width: 14, align: 'left'  },
        { header: 'Porteføljeværdi',  key: 'value',           width: 18, align: 'right', numFmt: '#,##0' },
        { header: 'Valuta',           key: 'currency',        width: 10, align: 'left'  },
        { header: 'Porteføljeværdi (DKK)', key: 'value_dkk',  width: 20, align: 'right', numFmt: '#,##0' },
      ],
      rows: rows,
    }],
  });
}

loadKunde();
</script>
</body>
</html>
